[item-description]
smart-train-combinator=A train-stop combinator that validates each wagon's dedicated buffer individually.
stc-multi=A multi-resource train-stop dispatcher: tracks up to 10 goods and calls one resource's train at a time, FIFO.
stc2-buffer-probe=A passive anchor wired between one wagon's buffer chests and the Smart Train Combinator.

