[entity-name]
smart-train-combinator=Smart Train Combinator
stc-multi=Smart Train Combinator (Multi-Resource)
stc2-buffer-probe=Freight Bay Probe

[entity-description]
smart-train-combinator=The brain. Wire it to the train stop and to the freight bay probes. Reads each probe's storage individually and calls a train only when that wagon's buffer is ready.
stc-multi=The multi-resource dispatcher. Tracks up to 10 goods and renames the train stop to request one resource at a time (FIFO): it stays committed to a request until a train arrives, then moves to the next. Auto-naming is always on; train limit is 0 or 1.
stc2-buffer-probe=A passive anchor, one per wagon. Wire its input side to that wagon's buffer chests and its output side to the Smart Train Combinator. It computes nothing on its own.

