stc2-buffer-probe=Sonde de quai de fret

[item-description]
smart-train-combinator=Un combinateur de gare qui vérifie individuellement le tampon dédié de chaque wagon.
stc2-buffer-probe=Une borne passive câblée entre les coffres du tampon d'un wagon et le Combinateur de gare intelligent.

