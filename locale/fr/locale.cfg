smart-train-combinator=Combinateur de gare intelligent
stc-multi=Combinateur de gare intelligent (multi-ressources)
stc2-buffer-probe=Sonde de quai de fret

[entity-description]
smart-train-combinator=Le cerveau. Câble-le à la gare et aux sondes de quai. Il lit le tampon de chaque sonde individuellement et n'appelle un train que lorsque le tampon de ce wagon est prêt.
stc-multi=L'aiguilleur multi-ressources. Il suit jusqu'à 10 ressources et renomme la gare pour en réclamer une seule à la fois (FIFO) : il reste sur une requête jusqu'à l'arrivée d'un train, puis passe à la suivante. Renommage automatique toujours actif ; limite de trains 0 ou 1.
stc2-buffer-probe=Une borne passive, une par wagon. Câble son côté entrée aux coffres du tampon de ce wagon, et son côté sortie au Combinateur de gare intelligent. Elle ne calcule rien par elle-même.

